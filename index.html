<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminal Tático - Kanban</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/default.css">
    <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0-rc.2/index.min.js"></script>
    <script>
        // Configura o sistema para entender o toque dos dedos no mobile
        MobileDragDrop.polyfill({ holdToDrag: 300 }); // Segurar 300ms para ativar o card
        window.addEventListener('touchmove', function() {}, {passive: false});
    </script>

    <style>
        :root {
            --bg-dark: #050505; --panel-bg: #0f1115; --neon-cyan: #00f0ff;
            --neon-pink: #ff0055; --border-color: #1f2937; --text-main: #e2e8f0; --text-muted: #64748b;
            --alert-red: #ff2a2a;
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px; }
        .glow-title { color: var(--neon-cyan); text-transform: uppercase; letter-spacing: 2px; font-size: 1.5rem; text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); margin: 0; }
        .support-contact { color: var(--text-muted); font-size: 0.9rem; font-family: monospace; border: 1px solid var(--border-color); padding: 5px 15px; border-radius: 4px; }
        
        .kanban-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; flex-grow: 1; overflow: hidden; transition: 0.3s; }
        .kanban-column { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 6px; display: flex; flex-direction: column; }
        .column-header { padding: 15px; font-weight: bold; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; border-bottom: 1px solid var(--border-color); text-align: center; }
        #col-base .column-header { color: #94a3b8; border-bottom-color: #94a3b8; }
        #col-sondagem .column-header { color: #f59e0b; border-bottom-color: #f59e0b; }
        #col-negociacao .column-header { color: var(--neon-pink); border-bottom-color: var(--neon-pink); }
        #col-fechamento .column-header { color: var(--neon-cyan); border-bottom-color: var(--neon-cyan); }
        .column-body { padding: 10px; flex-grow: 1; overflow-y: auto; min-height: 100px; }
        
        /* Cards & Selo Vermelho */
        .kanban-card { background: #181b21; border: 1px solid #2d3748; padding: 12px; margin-bottom: 10px; border-radius: 4px; cursor: grab; transition: all 0.2s; position: relative; }
        .kanban-card:hover { border-color: var(--neon-cyan); box-shadow: 0 0 10px rgba(0, 240, 255, 0.15); transform: translateY(-2px); }
        .card-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 5px; pointer-events: none; }
        .card-phone { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 12px; font-family: monospace; pointer-events: none; }
        
        .badge-alert {
            position: absolute; top: -8px; right: -8px; background-color: var(--alert-red); color: white;
            font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 12px;
            box-shadow: 0 0 10px var(--alert-red); animation: pulse-red 1.5s infinite; pointer-events: none;
            letter-spacing: 1px; border: 1px solid #ff7a7a;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(255, 42, 42, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0); }
        }

        .btn-action { background: transparent; border: 1px solid #334155; color: var(--text-main); padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; width: 100%; transition: 0.3s; margin-bottom: 5px; }
        .btn-action:hover { background: var(--neon-cyan); color: var(--bg-dark); border-color: var(--neon-cyan); font-weight: bold; }
        .btn-secondary { background: transparent; border: 1px solid #334155; color: var(--text-muted); padding: 6px 12px; border-radius: 3px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; width: 100%; transition: 0.3s; }
        .btn-secondary:hover { border-color: var(--text-main); color: var(--text-main); }

        #system-status { font-family: monospace; color: var(--neon-cyan); font-size: 0.85rem; margin-bottom: 15px; }

        /* Modal Lateral (Diário de Bordo) */
        .modal-overlay { position: fixed; top: 0; right: -500px; width: 400px; height: 100%; background: #0b0d12; border-left: 2px solid var(--neon-cyan); box-shadow: -5px 0 20px rgba(0, 240, 255, 0.1); transition: right 0.3s ease; z-index: 1000; display: flex; flex-direction: column; }
        .modal-overlay.open { right: 0; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { color: var(--neon-cyan); font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; margin: 0; }
        .close-btn { background: none; border: none; color: var(--neon-pink); font-size: 1.5rem; cursor: pointer; }
        .modal-content { padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        textarea { width: 100%; background: #181b21; border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 4px; font-family: 'Segoe UI', sans-serif; resize: vertical; min-height: 80px; box-sizing: border-box; }
        textarea:focus { outline: none; border-color: var(--neon-cyan); }
        
        .agendador-box { background: #14171d; border: 1px solid #2d3748; padding: 12px; border-radius: 4px; }
        .agendador-box label { display: block; font-size: 0.75rem; color: var(--neon-pink); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        .agendador-flex { display: flex; gap: 10px; }
        input[type="date"] { background: #0b0d12; color: var(--text-main); border: 1px solid var(--border-color); padding: 6px; border-radius: 3px; flex-grow: 1; font-family: monospace; outline: none;}
        input[type="date"]:focus { border-color: var(--neon-pink); }
        
        .nota-item { background: #14171d; border-left: 3px solid var(--neon-cyan); padding: 10px; border-radius: 0 4px 4px 0; margin-bottom: 10px; }
        .nota-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 5px; font-family: monospace; }
        .nota-texto { font-size: 0.85rem; line-height: 1.4; white-space: pre-wrap; }

        /* ========================================= */
        /* MODO TÁTICO MOBILE (RESPONSIVIDADE)       */
        /* ========================================= */
        @media (max-width: 768px) {
            body { padding: 10px; height: 100dvh; }
            header { flex-direction: column; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
            .glow-title { font-size: 1.2rem; }
            
            /* Converte a grade em abas de rolagem horizontal */
            .kanban-board {
                display: flex;
                flex-direction: row;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                padding-bottom: 15px;
            }
            .kanban-column {
                min-width: 85vw; /* Ocupa 85% da tela do celular */
                scroll-snap-align: center;
                margin-right: 10px;
            }
            
            /* Ajusta a barra de rolagem para o visual Cyberpunk */
            .kanban-board::-webkit-scrollbar { height: 4px; }
            .kanban-board::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 4px; }

            /* Ajusta o Modal (Diário) para ocupar a tela inteira no celular */
            .modal-overlay { width: 100%; right: -100%; border-left: none; border-top: 2px solid var(--neon-cyan); }
            
            /* Melhoria no botão de "Auditar IA" no celular para não espremer */
            .modal-content > div:nth-child(2) > div { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header>
        <h1 class="glow-title">Liderança Tática | Funil</h1>
        <div class="support-contact">Suporte: (44)7400-2557</div>
    </header>

    <div id="system-status">> Inicializando módulo neural. Aguardando sincronização...</div>

    <div class="kanban-board" id="main-board">
        <div class="kanban-column" id="col-base">
            <div class="column-header">Base (Leads)</div>
            <div class="column-body" id="Base" ondrop="soltarCard(event)" ondragover="permitirDrop(event)"></div>
        </div>
        <div class="kanban-column" id="col-sondagem">
            <div class="column-header">Sondagem</div>
            <div class="column-body" id="Sondagem" ondrop="soltarCard(event)" ondragover="permitirDrop(event)"></div>
        </div>
        <div class="kanban-column" id="col-negociacao">
            <div class="column-header">Negociação</div>
            <div class="column-body" id="Negociacao" ondrop="soltarCard(event)" ondragover="permitirDrop(event)"></div>
        </div>
        <div class="kanban-column" id="col-fechamento">
            <div class="column-header">Fechamento</div>
            <div class="column-body" id="Fechamento" ondrop="soltarCard(event)" ondragover="permitirDrop(event)"></div>
        </div>
    </div>

    <div class="modal-overlay" id="diario-modal">
        <div class="modal-header">
            <div>
                <h2 class="modal-title" id="diario-nome">Cliente</h2>
                <div style="font-family: monospace; color: var(--text-muted); font-size: 0.8rem;" id="diario-id"></div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button class="btn-action" style="border-color: #ef4444; color: #ef4444; margin: 0;" onclick="finalizarAtendimento()">Encerrar</button>
                <button class="close-btn" onclick="fecharDiario()">&times;</button>
            </div>
        </div>
        <div class="modal-content">
            
            <div class="agendador-box">
                <label>Definir Alerta de Retorno</label>
                <div class="agendador-flex">
                    <input type="date" id="data-retorno">
                    <button class="btn-action" style="width: auto; margin: 0; border-color: var(--neon-pink); color: var(--neon-pink);" onclick="agendarRetorno()">Armar</button>
                </div>
            </div>

            <div>
                <textarea id="nova-nota" placeholder="Registre dores, objeções ou o resumo da sondagem..."></textarea>
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-action" style="flex: 1;" onclick="salvarNota()">Criptografar Relatório</button>
                    <button class="btn-action" style="flex: 1; border-color: #f59e0b; color: #f59e0b;" onclick="auditarComIA()">Auditar com IA</button>
                </div>

                <div id="ia-feedback" style="display:none; padding: 12px; background: rgba(245, 158, 11, 0.05); border-left: 3px solid #f59e0b; margin-top: 15px; font-size: 0.85rem; color: #fbcfe8; line-height: 1.5;"></div>
            </div>
            
            <div style="border-bottom: 1px solid var(--border-color); margin: 5px 0;"></div>
            
            <div id="historico-notas">
                </div>
        </div>
    </div>

    <script>
        // API configurada
        const API_URL = 'https://script.google.com/macros/s/AKfycbzciM5IA25tZ9CcRkwj0-okP5CQ0IG3wpmZeT40vbPGiCtovD3au5Ccgr9jTxcJhSc6/exec'; 
        let clienteAtivo = null; 

        // Adquirir a data atual no formato YYYY-MM-DD para o comparador do selo
        const hojeLocal = new Date().toLocaleDateString("en-CA");

        async function inicializarCRM() {
            try {
                const resposta = await fetch(`${API_URL}?tipo=crm_clientes`);
                const dados = await resposta.json();
                document.getElementById('system-status').innerText = `> Sincronização concluída. ${dados.length} alvos localizados.`;

                document.querySelectorAll('.column-body').forEach(col => col.innerHTML = '');

                dados.forEach(item => {
                    const card = criarCard(item);
                    let colunaDestino = document.getElementById(item.status);
                    if (!colunaDestino) colunaDestino = document.getElementById('Base');
                    colunaDestino.appendChild(card);
                });
            } catch (erro) {
                document.getElementById('system-status').innerText = '> [ERRO CRÍTICO] Falha na conexão.';
                document.getElementById('system-status').style.color = '#ef4444';
            }
        }

        function criarCard(item) {
            const card = document.createElement('div');
            card.className = 'kanban-card';
            card.draggable = true;
            card.id = `card-${item.cpf || item.telefone}`; 
            card.dataset.cpf = item.cpf;
            card.dataset.telefone = item.telefone;
            
            const idRegistro = item.cpf || item.telefone;

            let badgeHtml = '';
            if (item.retorno && item.retorno <= hojeLocal && item.status !== 'Fechamento') {
                badgeHtml = '<div class="badge-alert">! AÇÃO REQUERIDA</div>';
            }

            card.innerHTML = `
                ${badgeHtml}
                <div class="card-name">${item.cliente}</div>
                <div class="card-phone">${item.telefone}</div>
                <button class="btn-action" onclick="iniciarChat('${item.telefone}', '${item.cliente}')">Com. Visual (WhatsApp)</button>
                <button class="btn-secondary" onclick="abrirDiario('${idRegistro}', '${item.cliente}')">Diário de Bordo</button>
            `;

            card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', card.id); setTimeout(() => card.style.opacity = '0.4', 0); });
            card.addEventListener('dragend', () => { card.style.opacity = '1'; });
            return card;
        }

        // --- DRAG AND DROP ---
        function permitirDrop(ev) { ev.preventDefault(); }
        async function soltarCard(ev) {
            ev.preventDefault();
            const cardId = ev.dataTransfer.getData('text/plain');
            const cardElement = document.getElementById(cardId);
            const colunaDestino = ev.target.closest('.column-body');
            
            if (colunaDestino && cardElement) {
                colunaDestino.appendChild(cardElement); 
                document.getElementById('system-status').innerText = '> Salvando alteração de quadrante...';
                
                if(colunaDestino.id === 'Fechamento' && cardElement.querySelector('.badge-alert')) {
                    cardElement.querySelector('.badge-alert').style.display = 'none';
                }

                try {
                    await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ tipo: 'crm_atualizar_status', cpf: cardElement.dataset.cpf, telefone: cardElement.dataset.telefone, novoStatus: colunaDestino.id })
                    });
                    document.getElementById('system-status').innerText = '> Banco de dados atualizado.';
                } catch (e) { document.getElementById('system-status').innerText = '> [ERRO] Desconexão ao salvar.'; }
            }
        }

        function iniciarChat(telefone, nomeCliente) {
            let numeroLimpo = String(telefone).replace(/\D/g, '');
            if (!numeroLimpo.startsWith('55') && numeroLimpo.length <= 11) numeroLimpo = '55' + numeroLimpo;
            window.open(`https://wa.me/${numeroLimpo}?text=Olá ${nomeCliente.split(' ')[0]}, tudo bem?`, '_blank');
        }

        // --- SISTEMA DIÁRIO DE BORDO & AGENDAMENTO ---
        async function abrirDiario(idBusca, nomeCliente) {
            clienteAtivo = idBusca;
            document.getElementById('diario-nome').innerText = nomeCliente;
            document.getElementById('diario-id').innerText = `ID: ${idBusca}`;
            document.getElementById('nova-nota').value = '';
            document.getElementById('data-retorno').value = ''; 
            
            const painelIA = document.getElementById('ia-feedback');
            painelIA.style.display = 'none';
            painelIA.innerHTML = '';

            document.getElementById('historico-notas').innerHTML = '<span style="color:var(--neon-cyan); font-family:monospace;">> Decodificando arquivos...</span>';
            
            document.getElementById('diario-modal').classList.add('open');
            
            // Inteligência tática: só espreme o painel se for em tela de computador.
            if (window.innerWidth > 768) {
                document.getElementById('main-board').style.marginRight = '420px'; 
            }
            
            try {
                const resposta = await fetch(`${API_URL}?tipo=crm_buscar_notas&id_cliente=${idBusca}`);
                const notas = await resposta.json();
                renderizarNotas(notas);
            } catch (e) {
                document.getElementById('historico-notas').innerHTML = '<span style="color:var(--neon-pink);">Falha ao acessar registros.</span>';
            }
        }

        function fecharDiario() {
            document.getElementById('diario-modal').classList.remove('open');
            document.getElementById('main-board').style.marginRight = '0';
            clienteAtivo = null;
        }

        function renderizarNotas(notas) {
            const painel = document.getElementById('historico-notas');
            if (notas.length === 0) {
                painel.innerHTML = '<span style="color:var(--text-muted); font-size: 0.85rem;">Nenhum relatório prévio encontrado. O alvo está limpo.</span>';
                return;
            }
            
            let html = '';
            notas.forEach(nota => {
                html += `
                    <div class="nota-item">
                        <div class="nota-meta">${nota.data} | Op: ${nota.vendedor}</div>
                        <div class="nota-texto">${nota.texto}</div>
                    </div>
                `;
            });
            painel.innerHTML = html;
        }

        async function salvarNota() {
            const texto = document.getElementById('nova-nota').value.trim();
            if (!texto || !clienteAtivo) return;

            const btn = event.target;
            btn.innerText = 'Enviando...';
            btn.disabled = true;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ tipo: 'crm_salvar_nota', id_cliente: clienteAtivo, vendedor: "Equipe", texto: texto })
                });
                abrirDiario(clienteAtivo, document.getElementById('diario-nome').innerText);
            } catch (e) {
                alert('Erro ao enviar relatório.');
            } finally {
                btn.innerText = 'Criptografar Relatório';
                btn.disabled = false;
            }
        }

        async function agendarRetorno() {
            const dataEscolhida = document.getElementById('data-retorno').value;
            if (!dataEscolhida || !clienteAtivo) {
                alert("Selecione uma data no calendário.");
                return;
            }

            const btn = event.target;
            btn.innerText = 'Armando...';
            
            const cardAtivo = document.getElementById(`card-${clienteAtivo}`);
            const cpf = cardAtivo ? cardAtivo.dataset.cpf : "";
            const telefone = cardAtivo ? cardAtivo.dataset.telefone : clienteAtivo;

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        tipo: 'crm_agendar_retorno', 
                        cpf: cpf, 
                        telefone: telefone, 
                        dataRetorno: dataEscolhida 
                    })
                });
                
                document.getElementById('system-status').innerText = '> Alerta configurado com sucesso. Recarregando grid...';
                btn.innerText = 'ARMADO ✓';
                
                setTimeout(inicializarCRM, 1000); 

            } catch (e) {
                alert('Erro ao salvar o alerta no banco de dados.');
                btn.innerText = 'Armar';
            }
        }

        // --- FUNÇÃO PARA ARQUIVAR / ENCERRAR ALVO ---
        async function finalizarAtendimento() {
            if(!confirm('Atenção: Deseja arquivar este cliente e retirá-lo do painel tático?')) return;

            const btn = event.target;
            btn.innerText = 'Arquivando...';

            const cardAtivo = document.getElementById(`card-${clienteAtivo}`);
            const cpf = cardAtivo ? cardAtivo.dataset.cpf : "";
            const telefone = cardAtivo ? cardAtivo.dataset.telefone : clienteAtivo;

            fecharDiario();
            document.getElementById('system-status').innerText = '> Arquivando alvo e limpando setor...';

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        tipo: 'crm_atualizar_status', 
                        cpf: cpf, 
                        telefone: telefone, 
                        novoStatus: 'Finalizado' 
                    })
                });
                
                setTimeout(inicializarCRM, 1000); 

            } catch (e) {
                alert('Erro ao arquivar o cliente no banco de dados.');
            }
        }

        // --- FUNÇÃO DO MENTOR DE IA ---
        async function auditarComIA() {
            const texto = document.getElementById('nova-nota').value.trim();
            const painelIA = document.getElementById('ia-feedback');
            const btn = event.target;

            if (!texto) {
                alert("Digite o resumo do atendimento na caixa antes de pedir a auditoria.");
                return;
            }

            btn.innerText = 'Processando...';
            btn.disabled = true;
            painelIA.style.display = 'block';
            painelIA.innerHTML = '<span style="color: #f59e0b; font-family: monospace;">> Analisando táticas aplicadas...</span>';

            try {
                const resposta = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ tipo: 'crm_auditoria_ia', texto: texto })
                });
                
                const resultado = await resposta.json();
                
                if (resultado.status === "Sucesso") {
                    painelIA.innerHTML = `<strong>MENTOR IA:</strong><br>${resultado.feedback}`;
                } else {
                    painelIA.innerHTML = `[ERRO] ${resultado.mensagem}`;
                }
            } catch (e) {
                painelIA.innerHTML = '[ERRO] Falha de conexão com os servidores da IA.';
            } finally {
                btn.innerText = 'Auditar com IA';
                btn.disabled = false;
            }
        }

        window.onload = inicializarCRM;
    </script>
</body>
</html>
